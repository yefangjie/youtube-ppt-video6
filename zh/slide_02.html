<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=1280, initial-scale=1.0" name="viewport" />
    <title>目录</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f5f5f5; }
        .slide { width: 1280px; height: 720px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    
    <div class="slide bg-white rounded-2xl shadow-2xl flex p-16">
        <div class="w-1/3 flex flex-col justify-center border-r border-slate-200 pr-12">
            <h2 class="text-5xl font-bold text-slate-800 mb-4">目录</h2>
            <p class="text-slate-500">Contents</p>
        </div>
        <div class="w-2/3 flex flex-col justify-center pl-12 space-y-8">
            <div class="flex items-center gap-6 group cursor-pointer">
                <span class="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl font-bold">01</span>
                <div>
                    <h3 class="text-2xl font-semibold text-slate-800">欧洲央行政策转向</h3>
                    <p class="text-slate-500">ECB Policy Shift</p>
                </div>
            </div>
            <div class="flex items-center gap-6 group cursor-pointer">
                <span class="w-16 h-16 rounded-full bg-emerald-600 text-white flex items-center justify-center text-2xl font-bold">02</span>
                <div>
                    <h3 class="text-2xl font-semibold text-slate-800">美国关税退款诉讼</h3>
                    <p class="text-slate-500">Tariff Refund Litigation</p>
                </div>
            </div>
            <div class="flex items-center gap-6 group cursor-pointer">
                <span class="w-16 h-16 rounded-full bg-amber-600 text-white flex items-center justify-center text-2xl font-bold">03</span>
                <div>
                    <h3 class="text-2xl font-semibold text-slate-800">全球煤炭价格飙升</h3>
                    <p class="text-slate-500">Global Coal Price Surge</p>
                </div>
            </div>
            <div class="flex items-center gap-6 group cursor-pointer">
                <span class="w-16 h-16 rounded-full bg-rose-600 text-white flex items-center justify-center text-2xl font-bold">04</span>
                <div>
                    <h3 class="text-2xl font-semibold text-slate-800">美国油价全球联动</h3>
                    <p class="text-slate-500">US Oil Price Global Linkage</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
