<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=1280, initial-scale=1.0" name="viewport" />
    <title>欧洲央行政策转向</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f5f5f5; }
        .slide { width: 1280px; height: 720px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    
    <div class="slide bg-white rounded-2xl shadow-2xl p-16 flex flex-col">
        <div class="mb-8">
            <p class="text-blue-600 font-semibold mb-2">01 / 欧洲央行政策转向</p>
            <h2 class="text-4xl font-bold text-slate-800">欧洲央行政策立场可能发生重大转变</h2>
        </div>
        <div class="flex-1 grid grid-cols-2 gap-8">
            <div class="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl p-8 flex flex-col justify-center">
                <div class="text-6xl mb-4">🏛️</div>
                <h3 class="text-2xl font-bold text-slate-800 mb-4">关键表态</h3>
                <p class="text-lg text-slate-600 leading-relaxed">欧洲央行副行长<strong class="text-blue-700">德金多斯</strong>首次明确表态，伊朗战争可能迫使央行改变政策立场</p>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 rounded-xl p-6 border-l-4 border-amber-500">
                    <h4 class="font-bold text-slate-800 mb-2">背景</h4>
                    <p class="text-slate-600">中东地区旷日持久的战争推高通胀预期</p>
                </div>
                <div class="bg-slate-50 rounded-xl p-6 border-l-4 border-rose-500">
                    <h4 class="font-bold text-slate-800 mb-2">影响</h4>
                    <p class="text-slate-600">摩根斯坦利已不再预期欧洲央行今年会降息</p>
                </div>
                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl p-6 text-white">
                    <p class="font-semibold">💡 这是主要央行对伊朗战争影响做出的最直接判断</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
