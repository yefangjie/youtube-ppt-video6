<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=1280, initial-scale=1.0" name="viewport" />
    <title>美国关税退款诉讼</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f5f5f5; }
        .slide { width: 1280px; height: 720px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    
    <div class="slide bg-white rounded-2xl shadow-2xl p-16 flex flex-col">
        <div class="mb-8">
            <p class="text-emerald-600 font-semibold mb-2">02 / 美国关税退款诉讼</p>
            <h2 class="text-4xl font-bold text-slate-800">法官命令政府退还1300亿美元关税</h2>
        </div>
        <div class="flex-1 flex gap-8">
            <div class="w-1/3 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl p-8 text-white flex flex-col justify-center items-center">
                <p class="text-7xl font-bold mb-4">$1300亿</p>
                <p class="text-xl opacity-90">需退还关税金额</p>
            </div>
            <div class="w-2/3 space-y-4">
                <div class="flex items-center gap-4 bg-slate-50 rounded-xl p-5">
                    <span class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl font-bold">1</span>
                    <div>
                        <h4 class="font-bold text-slate-800">受影响企业</h4>
                        <p class="text-slate-600">2000多家企业提起诉讼，包括Costco、联邦快递等知名企业</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 bg-slate-50 rounded-xl p-5">
                    <span class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl font-bold">2</span>
                    <div>
                        <h4 class="font-bold text-slate-800">法律依据</h4>
                        <p class="text-slate-600">最高法院上个月裁定关税无效</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 bg-slate-50 rounded-xl p-5">
                    <span class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl font-bold">3</span>
                    <div>
                        <h4 class="font-bold text-slate-800">时间表</h4>
                        <p class="text-slate-600">联邦贸易法院法官下令立即启动退款程序</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
